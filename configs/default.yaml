# configs/default.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Default training configuration for the TIDMAD AttentionAutoencoder denoiser.
#
# Memory budget guide for a 20 GB GPU (fp16 AMP):
#   base_channels=16, n_levels=3, batch_size=16  →  ~4  GB  (safe)
#   base_channels=16, n_levels=4, batch_size=16  →  ~8  GB  (safe)
#   base_channels=32, n_levels=4, batch_size=32  →  ~20 GB  (OOM on 20 GB)
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  window_size: 40000         # samples per segment (4 ms at 10 MS/s)
  stride: null               # null → non-overlapping (stride = window_size)
  max_windows_per_file: 2000 # cap per HDF5 file to keep epoch manageable
  batch_size: 16             # reduced from 32 to save memory
  num_workers: 4

# ── Model ────────────────────────────────────────────────────────────────────
model:
  in_channels: 1
  base_channels: 16          # reduced from 32; halves feature-map memory
  n_levels: 3                # reduced from 4; bottleneck is 40000/8=5000 steps
  n_attn_heads: 4            # reduced from 8; must divide base_channels * 2^n_levels
  attn_dropout: 0.1
  kernel_size: 7
  n_res_blocks: 2

# ── Training ─────────────────────────────────────────────────────────────────
# Aligned with jessicafry/TIDMAD reference: Adam(lr=5e-4), SmoothL1Loss, no scheduler
training:
  max_epochs: 100
  lr: 5.0e-4
  sample_rate: 1.0e7         # TIDMAD sample rate in Hz (10 MHz)
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2 # effective batch = 16*2 = 32, same as before

# ── Callbacks ────────────────────────────────────────────────────────────────
callbacks:
  checkpoint_monitor: "val/tidmad_score"
  checkpoint_mode: "max"
  early_stopping_patience: 15
  early_stopping_monitor: "val/tidmad_score"
  early_stopping_mode: "max"

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  project: "tidmad-denoiser"
  log_every_n_steps: 50
